spring:
  flyway:
    mixed: true
  # SWITCH: Change to 'cloud' to use Turso, or keep 'local' for SQLite
  # Alternatively, run with -Dspring.profiles.active=cloud
  profiles:
    active: ${DB_MODE:local}

  datasource:
    hikari:
      connection-test-query: SELECT 1
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: FinSightHikariPool
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

---
# LOCAL PROFILE (Standard SQLite)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: "jdbc:sqlite:finsight.db"
    driver-class-name: org.sqlite.JDBC

---
# CLOUD PROFILE (Turso / LibSQL)
spring:
  config:
    activate:
      on-profile: cloud
  datasource:
    # JDBC URL for tech.turso
    url: "jdbc:turso:https://finsight-uttamkb.aws-ap-south-1.turso.io?sync=true"
    driver-class-name: tech.turso.JDBC
    username: "token"
    password: ${TURSO_AUTH_TOKEN}
    hikari:
      maximum-pool-size: 5
      connection-test-query: SELECT 1
  flyway:
    enabled: true
    connect-retries: 3

---
app:
  api:
    secret-key: ${APP_API_SECRET_KEY:dev_secret_only_for_local}
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
  sync:
    drive-folder-url: ${DRIVE_FOLDER_URL:}
    service-account-json: ${SERVICE_ACCOUNT_JSON:}
    gemini-api-key: ${GEMINI_API_KEY:}

ai:
  gemini:
    model: ${GEMINI_MODEL:models/gemini-2.5-flash}

server:
  port: 8080
  tomcat:
    basedir: ./tmp
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.finsight: DEBUG
    org.flywaydb: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.apache.pdfbox: ERROR
    org.apache.fontbox: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
